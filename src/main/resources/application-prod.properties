spring.datasource.url=${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:${DB_HOST:localhost}}:${PGPORT:${DB_PORT:5432}}/${PGDATABASE:${MYSQLDATABASE:QuantityMeasurementDb}}}}
spring.datasource.username=${DB_USER:${MYSQLUSER:${DB_USERNAME:root}}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
