# Production profile: H2 Database
spring.datasource.url=jdbc:h2:./data/measurement-service;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# API Gateway CORS origins for production - comma separated URLs
application.api-gateway.allowed-origins=${API_GATEWAY_ORIGINS}
