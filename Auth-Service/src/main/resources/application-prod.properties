# Production profile: PostgreSQL
spring.datasource.url=${POSTGRES_DB_URL}
spring.datasource.username=${POSTGRES_DB_USERNAME:${DB_USER:}}
spring.datasource.password=${POSTGRES_DB_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# API Gateway CORS origins for production - comma separated URLs
application.api-gateway.allowed-origins=${API_GATEWAY_ORIGINS}
